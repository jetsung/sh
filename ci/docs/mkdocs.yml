site_name: ORG/REPO
site_description: ORG/REPO documentation
site_author: Jetsung Chan
site_url: https://ORG.github.io/REPO
repo_url: https://github.com/ORG/REPO
repo_name: ORG/REPO
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Jetsung Chan

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.integrate

plugins:
  - search:
      lang:
        - zh

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jetsung
    - icon: fontawesome/solid/envelope
      link: mailto:i@jetsung.com
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css
