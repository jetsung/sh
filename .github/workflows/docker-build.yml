name: Docker Build

on:
  workflow_dispatch:
    inputs:
      dockerfile_url:
        description: 'Dockerfile 下载地址'
        required: true
        type: string
      image_name:
        description: 'Docker 镜像名称及标签 (例如: my-app:latest)'
        required: true
        type: string
      platforms:
        description: '构建平台 (例如: linux/amd64,linux/arm64) (可选)'
        required: false
        type: string
        default: 'linux/amd64'
      build_script_url:
        description: '前置执行构建的 docker build bash 脚本的 URL (可选)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  entry:
    runs-on: ubuntu-24.04
    env:
      REGISTRY: ghcr.io
      IMAGE_FULL_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}
    steps:
      - name: Download Dockerfile
        run: |
          curl -sSL "${{ github.event.inputs.dockerfile_url }}" -o Dockerfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute Build and Push
        run: |
          PLATFORMS="${{ github.event.inputs.platforms }}"
          IMAGE_TAG="${{ env.IMAGE_FULL_NAME }}"
          
          if [ -n "${{ github.event.inputs.build_script_url }}" ]; then
            echo "Downloading and running build script..."
            curl -sSL "${{ github.event.inputs.build_script_url }}" -o build.sh
            chmod +x build.sh
            # 将完整的镜像名称和平台参数作为环境变量传递给脚本
            IMAGE_TAG="$IMAGE_TAG" PLATFORMS="$PLATFORMS" ./build.sh
          else
            if [ -n "$PLATFORMS" ]; then
              echo "Performing multi-platform build for: $PLATFORMS"
              docker buildx build --platform "$PLATFORMS" -t "$IMAGE_TAG" --push .
            else
              echo "Performing default docker build..."
              docker build -t "$IMAGE_TAG" .
              docker push "$IMAGE_TAG"
            fi
          fi
